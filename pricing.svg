<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="682" viewBox="0 0 1200 682">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f8fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .header-bg { fill: url(#headerGrad); }
    .table-header-bg { fill: #f6f8fa; }
    .table-header { font: 600 12px 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #57606a; text-transform: uppercase; letter-spacing: 0.5px; }
    .row { font: 14px 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #24292f; }
    .provider { font-weight: 600; fill: #0969da; }
    .cost { font-weight: 700; font-size: 15px; }
    .value { font-weight: 700; font-size: 15px; }
    .fast { fill: #1a7f37; }
    .medium { fill: #9a6700; }
    .slow { fill: #cf222e; }
    .status { fill: #57606a; }
    .divider { stroke: #d0d7de; stroke-width: 1; }
    .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
    .timestamp { font: 11px 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #57606a; }
    .title { font: bold 28px 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #24292f; }
    .subtitle { font: 14px 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #57606a; }
    .logo { fill: #24292f; }
    .confidence-exact { fill: #1a7f37; }
    .confidence-estimated { fill: #9a6700; }
    .confidence-unknown { fill: #cf222e; }
  </style>

  <!-- Background -->
  <rect class="bg" width="1200" height="682"/>

  <!-- Logo (black square with white C) -->
  <g transform="translate(24, 24)">
    <rect width="60" height="60" fill="#000000"/>
    <g transform="scale(0.035) translate(0, 0)">
      <path fill="#ffffff" d="M1036.26,1002.28h237.87l-.93,19.09c-8.38,110.32-49.81,198.3-123.82,262.07-73.09,63.31-170.84,95.43-290.48,95.43-130.81,0-235.55-44.69-311.43-133.6-74.48-87.98-112.65-209.48-112.65-361.23v-60.51c0-96.83,17.7-183.41,51.68-257.43,34.91-74.95,85.19-133.61,149.89-173.63,64.7-40.04,140.12-60.52,225.3-60.52,117.77,0,214.13,32.12,286.29,95.9,72.62,63.3,114.98,153.61,126.15,267.67l1.86,19.08h-238.34l-.93-15.83c-4.65-59.11-20.95-101.94-47.95-127.08-27-25.6-69.83-38.17-127.08-38.17-61.91,0-107.06,20.95-137.33,65.17-31.65,45.15-47.94,117.77-48.87,215.53v74.48c0,102.41,15.36,177.83,45.62,223.91,28.86,44.22,74.01,65.63,137.79,65.63,58.19,0,101.48-12.57,128.95-38.17,26.99-25.14,43.29-66.1,47.48-121.5l.93-16.3Z"/>
    </g>
  </g>

  <!-- Title -->
  <text class="title" x="100" y="55">Pricing Comparison</text>
  <text class="subtitle" x="100" y="78">Normalized to 1 vCPU + 2 GB RAM / hour — sorted by effective cost</text>
  <!-- Table header background -->
  <rect class="table-header-bg" y="134" width="1200" height="44"/>

  <!-- Table header text -->
  <text class="table-header" x="40" y="162">Provider</text>
  <text class="table-header" x="200" y="162">Eff. Cost / hr</text>
  <text class="table-header" x="380" y="162">Benchmark</text>
  <text class="table-header" x="580" y="162">Billing</text>
  <text class="table-header" x="740" y="162">Value Score</text>
  <text class="table-header" x="920" y="162">Confidence</text>

  <!-- blaxel -->
  <text class="row provider" x="40" y="208">Blaxel</text>
  <text class="row cost fast" x="200" y="208">~$0.0088</text>
  <text class="row" x="380" y="208">94.9 (100/100)</text>
  <text class="row" x="580" y="208">Active CPU</text>
  <text class="row value fast" x="740" y="208">95.2</text>
  <text class="row confidence-exact" x="920" y="208">exact</text>
  <line class="divider" x1="24" y1="222" x2="1176" y2="222"/>

  <!-- cloudflare -->
  <text class="row provider" x="40" y="252">Cloudflare</text>
  <text class="row cost fast" x="200" y="252">~$0.0252</text>
  <text class="row" x="380" y="252">77.0 (100/100)</text>
  <text class="row" x="580" y="252">Active CPU</text>
  <text class="row value fast" x="740" y="252">82.0</text>
  <text class="row confidence-exact" x="920" y="252">exact</text>
  <line class="divider" x1="24" y1="266" x2="1176" y2="266"/>

  <!-- vercel -->
  <text class="row provider" x="40" y="296">Vercel</text>
  <text class="row cost fast" x="200" y="296">~$0.0340</text>
  <text class="row" x="380" y="296">95.8 (100/100)</text>
  <text class="row" x="580" y="296">Active CPU</text>
  <text class="row value fast" x="740" y="296">89.2</text>
  <text class="row confidence-exact" x="920" y="296">exact</text>
  <line class="divider" x1="24" y1="310" x2="1176" y2="310"/>

  <!-- modal -->
  <text class="row provider" x="40" y="340">Modal</text>
  <text class="row cost fast" x="200" y="340">~$0.0661</text>
  <text class="row" x="380" y="340">94.4 (100/100)</text>
  <text class="row" x="580" y="340">Active CPU</text>
  <text class="row value fast" x="740" y="340">79.5</text>
  <text class="row confidence-exact" x="920" y="340">exact</text>
  <line class="divider" x1="24" y1="354" x2="1176" y2="354"/>

  <!-- codesandbox -->
  <text class="row provider" x="40" y="384">Codesandbox</text>
  <text class="row cost fast" x="200" y="384">$0.0743</text>
  <text class="row" x="380" y="384">75.3 (100/100)</text>
  <text class="row" x="580" y="384">Credits</text>
  <text class="row value fast" x="740" y="384">68.8</text>
  <text class="row confidence-estimated" x="920" y="384">estimated</text>
  <line class="divider" x1="24" y1="398" x2="1176" y2="398"/>

  <!-- e2b -->
  <text class="row provider" x="40" y="428">E2B</text>
  <text class="row cost fast" x="200" y="428">$0.0828</text>
  <text class="row" x="380" y="428">96.0 (100/100)</text>
  <text class="row" x="580" y="428">Per-second</text>
  <text class="row value fast" x="740" y="428">75.0</text>
  <text class="row confidence-exact" x="920" y="428">exact</text>
  <line class="divider" x1="24" y1="442" x2="1176" y2="442"/>

  <!-- hopx -->
  <text class="row provider" x="40" y="472">Hopx</text>
  <text class="row cost fast" x="200" y="472">$0.0828</text>
  <text class="row" x="380" y="472">48.6 (68/100)</text>
  <text class="row" x="580" y="472">Per-second</text>
  <text class="row value medium" x="740" y="472">53.4</text>
  <text class="row confidence-exact" x="920" y="472">exact</text>
  <line class="divider" x1="24" y1="486" x2="1176" y2="486"/>

  <!-- daytona -->
  <text class="row provider" x="40" y="516">Daytona</text>
  <text class="row cost fast" x="200" y="516">$0.0828</text>
  <text class="row" x="380" y="516">98.3 (100/100)</text>
  <text class="row" x="580" y="516">Per-second</text>
  <text class="row value fast" x="740" y="516">75.9</text>
  <text class="row confidence-exact" x="920" y="516">exact</text>
  <line class="divider" x1="24" y1="530" x2="1176" y2="530"/>

  <!-- runloop -->
  <text class="row provider" x="40" y="560">Runloop</text>
  <text class="row cost slow" x="200" y="560">$0.1584</text>
  <text class="row" x="380" y="560">92.9 (100/100)</text>
  <text class="row" x="580" y="560">Per-second</text>
  <text class="row value medium" x="740" y="560">43.9</text>
  <text class="row confidence-exact" x="920" y="560">exact</text>

  <!-- Timestamp -->
  <text class="timestamp" x="1176" y="644" text-anchor="end">Last updated: Jun 29, 2026</text>

  <!-- Footnotes -->
  <text class="timestamp" x="24" y="644">Eff. Cost = effective cost for 1 vCPU + 2 GB RAM / hr. Active-CPU providers (~) estimated at 10% utilization. Value Score = sqrt(benchmark x cost efficiency).</text>
  <text class="timestamp" x="24" y="658">Active-CPU billing (Vercel, Cloudflare, Blaxel): CPU charged only during execution, memory always wall-clock. Wall-clock providers: full rate shown.</text>
  <text class="timestamp" x="24" y="672">Confidence: exact = official pricing page, estimated = back-calculated from bundled tier.</text>

</svg>